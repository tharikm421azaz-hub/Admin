<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Secure Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117; --surface: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1);
    --text: #e2e8f0; --accent: #0ea5e9; --accent-hover: #38bdf8; --success: #10b981; --error: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  
  .admin-container { width: 100%; max-width: 600px; background: var(--surface); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 12px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
  .admin-header { margin-bottom: 30px; text-align: center; position: relative; }
  .admin-header h1 { font-size: 24px; font-weight: 600; color: #fff; margin-bottom: 8px; }
  .admin-header p { font-size: 14px; color: rgba(255,255,255,0.5); }
  
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.7); margin-bottom: 8px; }
  .form-group input { width: 100%; padding: 14px 16px; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border); border-radius: 6px; color: #fff; font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s; }
  .form-group input:focus { border-color: var(--accent); }
  .input-row { display: flex; gap: 16px; } .input-row > div { flex: 1; }
  .help-text { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 6px; display: block; }
  
  .btn { width: 100%; background: var(--accent); color: #fff; border: none; padding: 16px; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
  .btn:hover { background: var(--accent-hover); }
  .btn:disabled { background: #334155; cursor: not-allowed; }
  
  .logout-btn { position: absolute; right: 0; top: 0; background: transparent; color: var(--error); border: 1px solid var(--error); padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; }
  .logout-btn:hover { background: rgba(239, 68, 68, 0.1); }

  .toast { position: fixed; top: 20px; right: 20px; background: var(--success); color: #fff; padding: 12px 24px; border-radius: 6px; font-size: 14px; font-weight: 500; transform: translateY(-100px); transition: transform 0.3s; z-index: 2000;}
  .toast.show { transform: translateY(0); }
  .toast.error { background: var(--error); }
  
  .loading-overlay { position: fixed; inset: 0; background: rgba(13, 17, 23, 0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; color: var(--accent); font-weight: 600; font-size: 18px; transition: opacity 0.3s; }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  
  /* Sections toggle */
  #adminSection { display: none; }
  @media (max-width: 600px) { .input-row { flex-direction: column; gap: 0; } }
</style>
</head>
<body>

<div class="loading-overlay" id="loader">Checking authentication...</div>
<div class="toast" id="toast">Message</div>

<div class="admin-container" id="loginSection">
  <div class="admin-header">
    <h1>Admin Login</h1>
    <p>Sign in to edit website contact details.</p>
  </div>
  <form id="loginForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" required>
    </div>
    <button type="submit" class="btn" id="btnLogin">Sign In</button>
  </form>
</div>

<div class="admin-container" id="adminSection">
  <div class="admin-header">
    <h1>Contact Manager</h1>
    <p>Update the information displayed across the website.</p>
    <button class="logout-btn" id="btnLogout">Logout</button>
  </div>

  <form id="adminForm">
    <div class="input-row">
      <div class="form-group"><label>Primary Phone</label><input type="text" id="inpPhone" required></div>
      <div class="form-group"><label>Secondary Phone</label><input type="text" id="inpPhone2"></div>
    </div>
    <div class="input-row">
      <div class="form-group"><label>Primary WhatsApp (Display)</label><input type="text" id="inpWa1Display"></div>
      <div class="form-group"><label>Primary WhatsApp (Link)</label><input type="text" id="inpWa1Link"><span class="help-text">9477... (No +)</span></div>
    </div>
    <div class="input-row">
      <div class="form-group"><label>Secondary WhatsApp (Display)</label><input type="text" id="inpWa2Display"></div>
      <div class="form-group"><label>Secondary WhatsApp (Link)</label><input type="text" id="inpWa2Link"></div>
    </div>
    <div class="form-group"><label>Email Address</label><input type="email" id="inpEmail" required></div>
    <div class="form-group"><label>Location Text</label><input type="text" id="inpLocation" required></div>
    <button type="submit" class="btn" id="btnSave">Save Changes</button>
  </form>
</div>

<script type="module">
  // ============================================================
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBRYxMf6wXLuUh8yCrkFITmOkHTjHJE1_A",
  authDomain: "riha-offset.firebaseapp.com",
  databaseURL: "https://riha-offset-default-rtdb.firebaseio.com",
  projectId: "riha-offset",
  storageBucket: "riha-offset.firebasestorage.app",
  messagingSenderId: "334542366995",
  appId: "1:334542366995:web:485a9805a30bc1548ad2e6",
  measurementId: "G-85NEVFLRYK"
};
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  // Import Auth modules
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  let db, auth = null;
  const loader = document.getElementById('loader');
  const toast = document.getElementById('toast');
  const loginSection = document.getElementById('loginSection');
  const adminSection = document.getElementById('adminSection');

  // Fields
  const fields = {
    phone: document.getElementById('inpPhone'), phone2: document.getElementById('inpPhone2'),
    wa1Display: document.getElementById('inpWa1Display'), wa1Link: document.getElementById('inpWa1Link'),
    wa2Display: document.getElementById('inpWa2Display'), wa2Link: document.getElementById('inpWa2Link'),
    email: document.getElementById('inpEmail'), location: document.getElementById('inpLocation')
  };

  try {
    if (firebaseConfig.apiKey && firebaseConfig.apiKey !== 'YOUR_API_KEY') {
      const app = initializeApp(firebaseConfig);
      db = getFirestore(app);
      auth = getAuth(app);
      
      // Listen for auth state changes
      onAuthStateChanged(auth, (user) => {
        if (user) {
          // Logged in! Show admin panel and fetch data
          loginSection.style.display = 'none';
          adminSection.style.display = 'block';
          loadData();
        } else {
          // Not logged in! Show login screen
          loginSection.style.display = 'block';
          adminSection.style.display = 'none';
          loader.classList.add('hidden');
        }
      });

    } else {
      loader.textContent = "Error: Please add Firebase config.";
    }
  } catch(e) { loader.textContent = "Initialization failed."; console.error(e); }

  // --- LOGIN LOGIC ---
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnLogin');
    btn.disabled = true; btn.textContent = "Signing In...";
    try {
      await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
      // onAuthStateChanged will handle the UI swap automatically
    } catch (err) {
      showToast("Login Failed: " + err.message, true);
      btn.disabled = false; btn.textContent = "Sign In";
    }
  });

  // --- LOGOUT LOGIC ---
  document.getElementById('btnLogout').addEventListener('click', () => {
    signOut(auth).then(() => { showToast("Logged out successfully"); });
  });

  // --- FETCH DATA LOGIC ---
  async function loadData() {
    loader.textContent = "Loading settings...";
    loader.classList.remove('hidden');
    try {
      const snap = await getDoc(doc(db, 'settings', 'contact'));
      if (snap.exists()) {
        const d = snap.data();
        Object.keys(fields).forEach(k => { if(d[k]) fields[k].value = d[k]; });
      }
      loader.classList.add('hidden');
    } catch (e) {
      showToast("Error loading data. Check rules.", true);
      loader.classList.add('hidden');
    }
  }

  // --- SAVE DATA LOGIC ---
  document.getElementById('adminForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnSave');
    btn.disabled = true; btn.textContent = "Saving...";

    const dataToSave = {
      phone: fields.phone.value.trim(), phone2: fields.phone2.value.trim(),
      wa1Display: fields.wa1Display.value.trim(), wa1Link: fields.wa1Link.value.trim().replace(/\s|\+/g, ''),
      wa2Display: fields.wa2Display.value.trim(), wa2Link: fields.wa2Link.value.trim().replace(/\s|\+/g, ''),
      email: fields.email.value.trim(), location: fields.location.value.trim()
    };

    try {
      await setDoc(doc(db, 'settings', 'contact'), dataToSave);
      showToast("Settings saved successfully!");
    } catch (err) {
      showToast("Permission Denied: Ensure your email matches the Rules.", true);
    } finally {
      btn.disabled = false; btn.textContent = "Save Changes";
    }
  });

  function showToast(msg, isError = false) {
    toast.textContent = msg;
    toast.className = isError ? 'toast show error' : 'toast show';
    setTimeout(() => { toast.classList.remove('show'); }, 3000);
  }
</script>
</body>
</html>
